name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9  # Adapts to modern pnpm versions

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # Task 1: Runs your pipeline checks consistently using Turbo cache if available
      - name: Run Workspace Tests
        run: pnpm turbo run test --continue-on-error

